<!-- Watchlist Content -->
<div class="bg-surface-dark/40 border border-border-dark rounded-2xl flex flex-col overflow-hidden h-full">
    <div class="p-4 border-b border-border-dark flex items-center justify-between">
        <h3 class="text-sm font-bold uppercase tracking-widest text-slate-400">Watchlist</h3>
        <button class="text-primary text-xs font-bold hover:underline">Edit</button>
    </div>

    <div class="flex-1 custom-scrollbar overflow-y-auto">
        <div *ngIf="stocks.length === 0" class="p-8 text-center text-slate-500 text-sm italic">
            Your watchlist is empty. Add a symbol at the bottom.
        </div>

        <div *ngFor="let stock of stocks"
            class="p-4 flex items-center justify-between border-b border-border-dark/50 hover:bg-white/5 cursor-pointer transition-colors group">
            <div class="flex items-center gap-3">
                <div
                    class="size-8 rounded-lg bg-slate-800 flex items-center justify-center font-bold text-xs uppercase">
                    {{ stock.symbol[0] }}
                </div>
                <div>
                    <p class="text-sm font-bold text-white uppercase">{{ stock.symbol }}</p>
                    <p class="text-[10px] text-slate-500">{{ stock.name }}</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-sm font-bold text-white">${{ stock.price }}</p>
                <p class="text-[10px] text-success font-bold">+0.00%</p>
            </div>
        </div>
    </div>

    <div class="p-4 bg-background-dark/30 border-t border-border-dark">
        <div class="search-container flex gap-2 mb-2">
            <!-- Autocomplete Dropdown -->
            <div *ngIf="searchResult.length > 0" class="search-results-dropdown custom-scrollbar">
                <div *ngFor="let result of searchResult" (click)="selectSearchType(result)"
                    class="search-result-item group">
                    <div>
                        <span class="text-sm font-bold text-white uppercase">{{ result.symbol }}</span>
                        <span class="text-[10px] text-slate-500 ml-2">{{ result.name }}</span>
                    </div>
                    <span class="text-xs text-primary opacity-0 group-hover:opacity-100 transition-opacity">Add +</span>
                </div>
            </div>

            <input type="text" [(ngModel)]="searchTerm" placeholder="Enter SYMBOL (e.g. AAPL)" (keyup)="onSearchType()"
                (keyup.enter)="addStock()"
                class="flex-1 bg-slate-800 border border-border-dark rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-primary">
            <button (click)="addStock()"
                class="bg-primary hover:bg-primary-dark text-black font-bold px-4 py-2 rounded-lg text-xs transition-colors">
                Add
            </button>
        </div>
        <p class="text-[10px] text-slate-500 text-center">Press Enter or click Add to track a new stock</p>
    </div>
</div>
