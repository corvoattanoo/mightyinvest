<div class="stat-card" [ngClass]="variant">
    <!-- Glow effect overlay -->
    <div class="card-glow"></div>

    <div class="flex items-center justify-between mb-4 relative z-10">
        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">{{ title }}</p>
        <span class="material-symbols-outlined card-icon">{{ icon }}</span>
    </div>

    <h2 class="text-3xl font-black text-white mb-2 tracking-tight relative z-10">{{ value }}</h2>

    <div class="flex items-center gap-2 relative z-10">
        <span class="flex items-center text-[10px] font-black px-2 py-0.5 rounded tracking-tighter uppercase"
            [ngClass]="trend === 'up' ? 'trend-up' : 'trend-down'">
            <span class="material-symbols-outlined !text-[12px] mr-1">
                {{ trend === 'up' ? 'keyboard_double_arrow_up' : 'keyboard_double_arrow_down' }}
            </span>
            {{ percentage }}
        </span>
        <span class="text-slate-500 text-[10px] font-bold uppercase tracking-wider">Growth</span>
    </div>
</div>
