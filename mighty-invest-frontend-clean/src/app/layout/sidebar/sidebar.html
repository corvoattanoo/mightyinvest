<aside class="flex flex-col h-full glass-sidebar px-6 py-6 text-gray-400">
    <!-- Logo -->
    <div class="flex items-center gap-3 mb-10">
        <div class="w-10 h-10 rounded-lg flex items-center justify-center logo-glow">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
        </div>
        <span class="text-xl font-bold text-white tracking-tight">MightyInvest</span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 space-y-2">
        <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
            class="flex items-center gap-3 px-4 py-3 rounded-xl nav-link group transition-all">
            <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg>
            <span>Dashboard</span>
        </a>

        <a routerLink="/markets" routerLinkActive="active"
            class="flex items-center gap-3 px-4 py-3 rounded-xl nav-link group transition-all">
            <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
            <span>Markets</span>
        </a>

        <!-- Markets Sub-menu (Conditional) -->
        <div *ngIf="isMarketsPage" class="pl-12 py-2 space-y-1 animate-fadeIn">
            <div class="mb-4">
                <p class="text-[10px] font-black text-primary uppercase tracking-widest mb-2 opacity-60">Users' Choice</p>
                <div class="space-y-1">
                    <a [routerLink]="['/markets']" [queryParams]="{category: 'most-traded'}" routerLinkActive="sub-active"
                        class="block text-[10px] font-black uppercase tracking-widest py-1.5 opacity-50 hover:opacity-100 transition-all">Most Traded</a>
                    <a [routerLink]="['/markets']" [queryParams]="{category: 'most-bought'}" routerLinkActive="sub-active"
                        class="block text-[10px] font-black uppercase tracking-widest py-1.5 opacity-50 hover:opacity-100 transition-all">Most Bought</a>
                    <a [routerLink]="['/markets']" [queryParams]="{category: 'most-shorted'}" routerLinkActive="sub-active"
                        class="block text-[10px] font-black uppercase tracking-widest py-1.5 opacity-50 hover:opacity-100 transition-all">Most Shorted</a>
                </div>
            </div>
            
            <div class="mb-4">
                <p class="text-[10px] font-black text-primary uppercase tracking-widest mb-2 opacity-60">Thematic</p>
                <div class="space-y-1">
                    <a *ngFor="let cat of ['commodities', 'indices', 'forex', 'stocks', 'crypto', 'etfs', 'treasuries']"
                       [routerLink]="['/markets']" [queryParams]="{category: cat}" routerLinkActive="sub-active"
                       class="block text-[10px] font-black uppercase tracking-widest py-1.5 opacity-50 hover:opacity-100 transition-all">
                       {{ cat }}
                    </a>
                </div>
            </div>
        </div>

        <a routerLink="/portfolio" routerLinkActive="active"
            class="flex items-center gap-3 px-4 py-3 rounded-xl nav-link group transition-all">
            <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            <span>Portfolio</span>
        </a>

        <a routerLink="/news" routerLinkActive="active"
            class="flex items-center gap-3 px-4 py-3 rounded-xl nav-link group transition-all">
            <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
            </svg>
            <span>News</span>
        </a>
    </nav>

    <!-- Bottom Section -->
    <div class="mt-auto space-y-6">
        <!-- Upgrade Card -->
        <div class="relative overflow-hidden p-5 rounded-2xl premium-card-glass group">
            <div class="relative z-10">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs font-black text-white tracking-widest uppercase">Premium Plan</span>
                    <span class="pro-badge text-[10px] px-2 py-0.5 rounded-full font-black">PRO</span>
                </div>
                <p class="text-[11px] text-slate-300 mb-4 font-bold leading-relaxed opacity-80">
                    Get advanced trading signals and 0% commission fees.
                </p>
                <button
                    class="w-full btn-premium py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all">
                    Upgrade Now
                </button>
            </div>
        </div>

        <!-- Settings -->
        <a href="#"
            class="flex items-center gap-3 px-4 py-3 rounded-xl nav-link opacity-60 hover:opacity-100 transition-all">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="text-sm font-bold">Settings</span>
        </a>
    </div>
</aside>
