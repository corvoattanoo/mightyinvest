<nav class="h-16 bg-[#090b0e] border-b border-gray-800/50 flex items-center justify-between px-6 sticky top-0 z-50">
    <!-- Left: Search and Market Status -->
    <div class="flex items-center flex-1 max-w-2xl gap-4">
        <div class="relative flex-1 group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-4 w-4 text-gray-500 group-focus-within:text-blue-500 transition-colors" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <input type="text"
                [(ngModel)]="searchTerm" (input)="onSearch()"
                class="block w-full bg-[#111827]/80 border border-gray-800 rounded-lg py-2 pl-10 pr-3 text-gray-300 placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500/50 focus:border-blue-500/50 text-sm transition-all"
                placeholder="Search markets, stocks, or crypto assets...">
            <!-- Search Results Dropdown -->
            <div *ngIf="searchResult.length > 0"
                class="absolute top-full mt-2 left-0 right-0 bg-slate-900 border border-border-dark rounded-lg shadow-2xl overflow-hidden z-50 max-h-48 overflow-y-auto custom-scrollbar">
                <div *ngFor="let result of searchResult" (click)="onSelectStock(result)"
                    class="p-2 hover:bg-white/10 cursor-pointer border-b border-border-dark/50 last:border-0 flex items-center gap-2">
                    <div class="size-5 rounded bg-slate-700 flex items-center justify-center text-[8px] font-bold">
                        {{ result.symbol[0] }}
                    </div>
                    <div class="text-left overflow-hidden">
                        <p class="text-[11px] font-bold text-white leading-tight">{{ result.symbol }}</p>
                        <p class="text-[9px] text-slate-400 truncate leading-tight">{{ result.name }}</p>
                    </div>
                </div>
            </div>
        </div>
        <div [ngClass]="marketStatus.isOpen ? 'bg-[#064e3b]/30 text-[#10b981] border-[#064e3b]' : 'bg-red-500/10 text-red-500 border-red-500/50'"
            class="flex items-center gap-2 px-3 py-1.5 rounded-full border text-[10px] font-bold whitespace-nowrap tracking-wider">
            <span
                [ngClass]="marketStatus.isOpen ? 'bg-[#10b981] animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-red-500'"
                class="w-2 h-2 rounded-full"></span>
            {{ marketStatus.isOpen ? 'MARKET OPEN' : 'MARKET CLOSED' }}
            <span *ngIf="marketStatus.session" class="opacity-60">({{ marketStatus.session | uppercase }})</span>
        </div>
    </div>

    <!-- Right: Actions & Profile -->
    <div class="flex items-center gap-5" *ngIf="currentUser$ | async as user; else guestMode">
        <button
            class="relative p-2 text-gray-400 hover:text-white bg-[#1f2937]/50 rounded-lg transition-all border border-transparent hover:border-gray-700">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border border-[#090b0e]"></span>
        </button>

        <div class="h-8 w-[1px] bg-gray-800"></div>

        <div class="flex items-center gap-3">
            <div class="text-right hidden sm:block">
                <div class="text-sm font-bold text-white leading-tight">{{ user.name }}</div>
                <div class="text-[10px] text-gray-500 font-bold tracking-widest uppercase cursor-pointer hover:text-red-500 transition-colors"
                    (click)="logout()">Logout</div>
            </div>
            <div
                class="w-10 h-10 rounded-lg overflow-hidden border border-gray-700 p-[1px] bg-gradient-to-tr from-gray-800 to-gray-700 shadow-xl">
                <img [src]="'https://ui-avatars.com/api/?name=' + user.name + '&background=4f46e5&color=fff&bold=true'"
                    alt="User Profile" class="w-full h-full object-cover rounded-[7px]">
            </div>
        </div>
    </div>

    <!-- Guest Mode (Not Logged In) -->
    <ng-template #guestMode>
        <div class="flex items-center gap-4">
            <a href="/login" class="text-sm font-bold text-gray-400 hover:text-white transition-colors">Sign In</a>
            <a href="/register"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-[0_0_15px_rgba(37,99,235,0.3)]">Get
                Started</a>
        </div>
    </ng-template>
</nav>
