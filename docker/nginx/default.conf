# === UPSTREAM (Backend Container'lari) ===
upstream php-fpm {
    server app:9000;       # "app" = docker-compose'daki PHP-FPM container
}
upstream angular {
    server frontend:4200;  # "frontend" = docker-compose'daki Angular container
}
# === HTTP -> HTTPS YÖNLENDİRMESİ ===
server {
    listen 80;
    server_name mightyinvest.online www.mightyinvest.online;
    
    # Tüm HTTP isteklerini HTTPS'e yönlendir
    return 301 https://$host$request_uri;
}
# === ANA SUNUCU (HTTPS) ===
server {
    listen 443 ssl;
    server_name mightyinvest.online www.mightyinvest.online;
    # SSL Sertifika Yolları (Certbot tarafından oluşturulacak)
    ssl_certificate /etc/letsencrypt/live/mightyinvest.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mightyinvest.online/privkey.pem;
    # === SSL GÜVENLİK AYARLARI ===
    ssl_protocols TLSv1.2 TLSv1.3;        # Sadece modern protokoller
    ssl_ciphers HIGH:!aNULL:!MD5;          # Zayıf şifreler devre dışı
    ssl_prefer_server_ciphers on;          # Sunucu tercihlerine öncelik ver
    ssl_session_cache shared:SSL:10m;      # SSL oturum cache'i (performans için)
    ssl_session_timeout 10m;               # Cache süresi
    root /var/www/html/public;
    index index.php;
    # === GÜVENLİK HEADER'LARI ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # === API İSTEKLERİ -> Laravel ===
    location /api {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        try_files $uri $uri/ /index.php?$query_string;
    }
    # === TELESCOPE İSTEKLERİ -> Laravel ===
    location ~ ^/(telescope|vendor/telescope) {
        try_files $uri $uri/ /index.php?$query_string;
    }
    # === PHP İŞLEME ===
    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 60;
        fastcgi_read_timeout 60;
    }
    # === FRONTEND İSTEKLERİ -> Angular ===
    location / {
        proxy_pass http://angular;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # === STATİK DOSYALAR (Laravel) ===
    location /storage {
        root /var/www/html/public;
        try_files $uri =404;
    }
}