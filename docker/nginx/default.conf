# === UPSTREAM (Backend Container'lari) ===
upstream php-fpm {
    server app:9000;       # "app" = docker-compose'daki PHP-FPM container
}
upstream angular {
    server frontend:4200;  # "frontend" = docker-compose'daki Angular container
}
server {
    listen 80;
    server_name localhost;
    # === GUVENLIK HEADER'LARI ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # === API ISTEKLERI -> Laravel ===
    location /api {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        try_files $uri $uri/ /index.php?$query_string;
    }

    # === TELESCOPE ISTEKLERI -> Laravel ===
    location ~ ^/(telescope|vendor/telescope) {
        try_files $uri $uri/ /index.php?$query_string;
    }
    # === PHP ISLEME ===
    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 60;
        fastcgi_read_timeout 60;
    }
    # === FRONTEND ISTEKLERI -> Angular ===
    location / {
        proxy_pass http://angular;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # === STATIK DOSYALAR (Laravel) ===
    location /storage {
        root /var/www/html/public;
        try_files $uri =404;
    }
}