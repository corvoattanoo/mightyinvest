# Docker DNS Resolver
resolver 127.0.0.11 valid=30s;
# === HTTP -> HTTPS YÖNLENDİRMESİ ===
server {
    listen 80;
    server_name mightyinvest.online www.mightyinvest.online;
    return 301 https://$host$request_uri;
}
# === ANA SUNUCU (HTTPS) ===
server {
    listen 443 ssl;
    server_name mightyinvest.online www.mightyinvest.online;
    # SSL Sertifika Yolları
    ssl_certificate /etc/letsencrypt/live/mightyinvest.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mightyinvest.online/privkey.pem;
    # SSL GÜVENLİK AYARLARI
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    root /var/www/html/public;
    index index.php;
    # === API İSTEKLERİ -> Laravel ===
    location /api {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        try_files $uri $uri/ /index.php?$query_string;
    }
    # === PHP İŞLEME ===
    location ~ \.php$ {
        set $target_app app;
        fastcgi_pass $target_app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
    # === FRONTEND İSTEKLERİ -> Angular ===
    location / {
        set $target_frontend frontend;
        proxy_pass http://$target_frontend:4200;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # === STATİK DOSYALAR ===
    location /storage {
        root /var/www/html/public;
        try_files $uri =404;
    }
}