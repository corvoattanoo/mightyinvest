; === UPLOAD AYARLARI ===
upload_max_filesize = 20M
post_max_size = 25M
; === BELLEK ===
memory_limit = 256M
; === ZAMAN ASIMI ===
max_execution_time = 60
; === OPCACHE (Performans) ===
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0
; === HATA AYIKLAMA ===
display_errors = Off
log_errors = On
; === GUVENLIK ===
expose_php = Off